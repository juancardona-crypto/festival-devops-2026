name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verificar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Verificar index.html
        run: test -f frontend/index.html

      - name: Verificar style.css
        run: test -f frontend/style.css

      - name: Verificar README.md
        run: test -f README.md
